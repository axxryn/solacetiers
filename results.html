<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rankings — SolaceTiers</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .results-wrap { max-width: 1100px; margin: 0 auto; padding: 32px; }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .filter-chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: var(--transition);
    }
    .filter-chip:hover { border-color: var(--border-glow); color: var(--text); }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .view-toggle {
      margin-left: auto;
      display: flex;
      gap: 4px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
    }
    .view-btn {
      padding: 6px 12px;
      border-radius: 4px;
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition);
    }
    .view-btn.active { background: var(--card-solid); color: var(--text); }

    /* List view */
    .list-view { display: flex; flex-direction: column; gap: 4px; }

    .result-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: var(--transition);
    }
    .result-row:hover { border-color: var(--border-glow); background: var(--bg3); }

    .result-rank {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }

    .result-player {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .result-username {
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .result-time {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* Tier list view */
    .tierlist-view {}

    .tierlist-row {
      display: flex;
      margin-bottom: 4px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .tierlist-label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      min-height: 56px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 24px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .tierlist-S .tierlist-label { background: #f0b42920; color: var(--s); }
    .tierlist-A .tierlist-label { background: #ef444420; color: var(--a); }
    .tierlist-B .tierlist-label { background: #a855f720; color: var(--b); }
    .tierlist-C .tierlist-label { background: #3b82f620; color: var(--c); }
    .tierlist-D .tierlist-label { background: #22c55e20; color: var(--d); }
    .tierlist-F .tierlist-label { background: #6b728020; color: var(--f); }

    .tierlist-players {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 12px;
      background: var(--card);
      flex: 1;
      align-items: center;
      min-height: 56px;
    }

    .tl-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 10px 5px 7px;
      border-radius: 6px;
      background: var(--bg3);
      border: 1px solid var(--border);
      font-family: 'Exo 2', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      transition: var(--transition);
    }
    .tl-chip:hover { border-color: var(--border-glow); }
    .tl-chip .tl-avatar {
      width: 22px; height: 22px; border-radius: 4px; object-fit: cover;
    }
    .tl-chip .tl-mode {
      font-size: 10px;
      opacity: 0.5;
    }

    .tl-empty {
      color: var(--text-dim);
      font-size: 13px;
      font-style: italic;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .page-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 30px;
      font-weight: 700;
    }
    .page-sub { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
  </style>
</head>

<div class="results-wrap">
  <div class="page-header">
    <div>
      <div class="page-title">Official Rankings</div>
      <div class="page-sub" id="page-sub">Loading placements...</div>
    </div>
    <a href="submit.html" class="btn btn-primary" style="flex-shrink:0">+ Request Test</a>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <span class="filter-label">Mode:</span>
    <button class="filter-chip active" data-mode="all" onclick="setModeFilter('all')">All</button>
    <button class="filter-chip" data-mode="smp" onclick="setModeFilter('smp')">🏡 SMP</button>
    <button class="filter-chip" data-mode="sword" onclick="setModeFilter('sword')">⚔️ Sword</button>
    <button class="filter-chip" data-mode="axe" onclick="setModeFilter('axe')">🪓 Axe</button>
    <button class="filter-chip" data-mode="mace" onclick="setModeFilter('mace')">🔨 Mace</button>
    <div class="view-toggle">
      <button class="view-btn active" id="view-list" onclick="setView('list')" title="List view">≡</button>
      <button class="view-btn" id="view-tierlist" onclick="setView('tierlist')" title="Tier list view">⊞</button>
    </div>
  </div>

  <!-- Content -->
  <div id="results-content"></div>
</div>

<!-- ADMIN OVERLAY -->
<div class="admin-overlay" id="admin-overlay">
  <div class="admin-panel">
    <div class="admin-header">
      <div class="admin-title">⚙️ Admin Panel</div>
      <button class="admin-close" onclick="document.getElementById('admin-overlay').classList.remove('open')">✕</button>
    </div>
    <a href="admin.html" class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:10px">Open Full Admin Panel</a>
    <button class="btn btn-ghost" onclick="document.getElementById('admin-overlay').classList.remove('open')" style="width:100%;justify-content:center">Close</button>
  </div>
</div>

<script src="app.js"></script>
<script>
  let currentMode = 'all';
  let currentView = 'list';

  // Check URL params
  const urlParams = new URLSearchParams(window.location.search);
  const urlMode = urlParams.get('mode');
  if (urlMode && MODES.find(m => m.id === urlMode)) {
    currentMode = urlMode;
  }

  function setModeFilter(mode) {
    currentMode = mode;
    document.querySelectorAll('.filter-chip').forEach(el => {
      el.classList.toggle('active', el.dataset.mode === mode);
    });
    render();
  }

  function setView(v) {
    currentView = v;
    document.getElementById('view-list').classList.toggle('active', v === 'list');
    document.getElementById('view-tierlist').classList.toggle('active', v === 'tierlist');
    render();
  }

  function getFiltered() {
    const results = getResults();
    if (currentMode === 'all') return results;
    return results.filter(r => r.mode === currentMode);
  }

  function render() {
    const results = getFiltered();
    const sub = document.getElementById('page-sub');
    sub.textContent = `${results.length} official placement${results.length !== 1 ? 's' : ''}${currentMode !== 'all' ? ' in ' + currentMode.toUpperCase() : ''}`;

    const container = document.getElementById('results-content');

    if (results.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🏆</div>
          <p>No official placements yet${currentMode !== 'all' ? ' for this mode' : ''}.<br/>Be the first to get tested!</p>
          <a href="submit.html" class="btn btn-primary" style="margin-top:20px;display:inline-flex">Request a Test</a>
        </div>`;
      return;
    }

    if (currentView === 'list') {
      renderList(container, results);
    } else {
      renderTierList(container, results);
    }
  }

  function renderList(container, results) {
    // Sort by tier order then alphabetically
    const sorted = [...results].sort((a, b) => {
      const ai = TIER_ORDER.indexOf(a.tier), bi = TIER_ORDER.indexOf(b.tier);
      if (ai !== bi) return ai - bi;
      return a.username.localeCompare(b.username);
    });

    container.innerHTML = `<div class="list-view">${sorted.map((r, i) => {
      const mode = MODES.find(m => m.id === r.mode) || { label: r.mode, icon: '🎮' };
      return `
        <div class="result-row">
          <div class="result-rank">${i + 1}</div>
          <div class="result-player">
            <div class="avatar">
              <img src="${mcAvatarUrl(r.username)}" alt="${r.username}"
                   onerror="this.style.display='none';this.parentElement.textContent='${r.username[0]?.toUpperCase() || '?'}'" />
            </div>
            <div class="result-username">${r.username}</div>
          </div>
          <div class="result-meta">
            <span class="mode-badge">${mode.icon} ${mode.label}</span>
            <div class="tier-badge tier-${r.tier}">${r.tier}</div>
            <span class="result-time">${timeAgo(r.timestamp)}</span>
          </div>
        </div>`;
    }).join('')}</div>`;
  }

  function renderTierList(container, results) {
    const html = TIER_ORDER.map(tier => {
      const players = results.filter(r => r.tier === tier);
      const chips = players.length > 0
        ? players.map(r => {
            const mode = MODES.find(m => m.id === r.mode) || { label: r.mode, icon: '🎮' };
            return `<div class="tl-chip">
              <img class="tl-avatar" src="${mcAvatarUrl(r.username)}" alt="${r.username}"
                   onerror="this.style.display='none'" />
              ${r.username}
              <span class="tl-mode">${mode.icon}</span>
            </div>`;
          }).join('')
        : '<span class="tl-empty">—</span>';

      return `<div class="tierlist-row tierlist-${tier}">
        <div class="tierlist-label">${tier}</div>
        <div class="tierlist-players">${chips}</div>
      </div>`;
    }).join('');

    container.innerHTML = `<div class="tierlist-view">${html}</div>`;
  }

  // Init
  if (urlMode) setModeFilter(urlMode);
  render();
  setNavActive();
  initSecretKey(() => document.getElementById('admin-overlay').classList.add('open'));

  // Refresh on storage changes (from admin panel in another tab)
  window.addEventListener('storage', () => render());
</script>
</body>
